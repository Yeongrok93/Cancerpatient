name: Supabase Keep-Alive

on:
  schedule:
    - cron: "0 1 * * *"   # 매일 오전 10시 (KST = UTC+9, so UTC 01:00)
  workflow_dispatch:        # 수동 실행 버튼도 활성화

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/survey_sessions?limit=1" \
            -H "apikey: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}")
          echo "Supabase response: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Warning: unexpected status $STATUS"
            exit 1
          fi
